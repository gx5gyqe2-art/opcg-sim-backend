# ruff の最小ラチェット（⑤E-7）。
# 選択ルールは E722（裸 except 禁止）のみで開始する。既存コードは E-5/E-6 で違反 0 のため即 green。
# 目的は「裸 except の再混入を CI で機械的に止める」こと。将来 BLE001（broad-except 検出）等へ
# 広げる余地はあるが、本リファクタの範囲外（広げる際は別 PR で段階導入する）。
# 注記: pytest 設定はここに置かない（既存の conftest/_bootstrap 構成を変えないため）。
[tool.ruff]
target-version = "py311"

[tool.ruff.lint]
select = ["E722"]
