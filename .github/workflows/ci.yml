name: CI

# プルリクエスト時と main への push 時に、テスト・構造監査・品質ゲートを自動実行する。
# 失敗（赤）になればマージ前に検知できる。監査（full_card_audit / text_execution_audit /
# effect_oracle）は tests/test_full_card_audit.py・test_quality_gates.py・
# test_full_card_baseline.py として pytest に統合済みのため、pytest 一発で全ゲートを通す。

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        # google-cloud-{storage,firestore} は CI では入れない。tests/conftest.py が
        # google.cloud をスタブ化するため不要で、実 Firestore 接続を避けられる
        # （ローカル検証 782 passed と同一構成）。pytest/httpx はテスト実行用。
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn websockets pydantic python-multipart requests
          pip install pytest pytest-xdist httpx
          pip install numpy   # 学習型CPU(opcg_sim/src/learned)＋RL検証ハーネスの依存

      - name: Run tests, structural audits, and quality gates
        env:
          OPCG_LOG_SILENT: "1"
        # -s（キャプチャ無効）はこのスイートの必須フラグ（docs/README.md）。
        # -n auto は pytest-xdist の並列実行（コア数自動）。決定論テスト＝順序非依存で安全。
        # -m "not slow" は最重量テスト（test_journal の parked_resume ~245s）を CI から除外
        #   ＝make/unmake を触ったときに手動 `-m slow` で回す前提（docs/TEST_SPEC.md §実行方法）。
        # ローカル4コアで全1113pass・約8分→約4分（parked_resume 除外で壁時計上限が解消）。
        run: python -m pytest tests/ -q -s -n auto -m "not slow" -p no:cacheprovider
